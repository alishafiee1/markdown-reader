schema: spec-driven

context: |
  Standalone Node.js markdown reader web app (not a CMS module).
  Tech stack: Node 18+, Express, sql.js (SQLite in-process), marked, multer.
  Frontend: vanilla JS in public/ — no React.
  Content source of truth: content/docs/ on disk; DB stores users, metadata, progress only.
  Defaults: PORT=4002, HOST=0.0.0.0 for LAN access.
  Human docs (FA): docs/change/bookshelf-reader/
  AI compact map: docs-for-ai/change/bookshelf-reader.md

rules:
  proposal:
    - Include Non-goals section from human proposal
    - List all capability spec names in Capabilities section
  design:
    - Reference ui-behavior.md and reading-themes-guide.md for UI details
    - Document all /api/ endpoints
  tasks:
    - Map to phases 0-6 from human tasks.md
    - Each task should name target files/modules
