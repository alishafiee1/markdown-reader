<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کتاب‌خوان مارک‌داون</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./marked.min.js"></script>
</head>
<body class="light">

    <header class="app-bar">
        <div class="app-bar-right">
            <button id="menuBtn" class="icon-btn" title="منو و تاریخچه">
                <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 id="appTitle">کتاب‌خوان مارک‌داون</h1>
        </div>
        <div class="app-bar-left">
            <button id="directionToggleBtn" class="icon-btn" title="تغییر جهت متن">↔️</button>
            <button id="themeToggleBtn" class="icon-btn" title="تغییر تم">🌓</button>
            <button id="saveAsBtn" class="icon-btn" title="ذخیره به عنوان HTML" style="display: none;">💾</button>
        </div>
    </header>

    <div id="drawerOverlay" class="drawer-overlay"></div>
    <aside id="drawer" class="drawer">
        <div class="drawer-header">
            <h2>امکانات</h2>
            <button id="closeMenuBtn" class="icon-btn">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>

        <div class="drawer-content">
            <label class="upload-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
                آپلود فایل جدید (.md)
                <input type="file" id="mdFileInput" accept=".md,.txt">
            </label>

            <button id="syncBundleBtn" class="upload-btn" type="button" style="margin-top: 8px;">
                🔄 بروزرسانی از پوشه content
            </button>

            <div class="history-section">
                <h3>📚 کتابخانه (SQLite)</h3>
                <div id="historyContainer" class="history-list"></div>
            </div>
        </div>
    </aside>

    <main class="reading-container">
        <div id="welcomeMessage" class="welcome-msg">
            <svg viewBox="0 0 24 24" width="60" height="60" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <p>برای شروع، یک فایل مارک‌داون آپلود کنید یا از منو، مطالب ذخیره‌شده را انتخاب کنید.</p>
        </div>
        <article id="markdownOutput" class="markdown-body" style="display: none;"></article>
    </main>

    <script src="./app.js"></script>
</body>
</html>
